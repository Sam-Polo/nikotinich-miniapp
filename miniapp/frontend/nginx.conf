server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — index.html не кэшируем, чтобы всегда получать свежие ссылки на бандлы
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # кэширование статики (js/css с хэшами — immutable)
    # location ~* \.(js|css|...)$ имеет приоритет над location / для совпадений
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
